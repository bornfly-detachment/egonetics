<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NewNotionStyleEditor Test</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: Arial, sans-serif;
            margin: 0;
            padding: 20px;
        }
        .container {
            max-width: 800px;
            margin: 0 auto;
        }
        .editor-container {
            background-color: #1e1e1e;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0, 0, 0, 0.3);
        }
        .block {
            margin-bottom: 10px;
            padding: 10px;
            background-color: #2d2d2d;
            border-radius: 4px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }
        .block-content {
            flex: 1;
        }
        .block-actions {
            display: flex;
            gap: 5px;
        }
        button {
            background-color: #3d3d3d;
            color: #e0e0e0;
            border: none;
            padding: 5px 10px;
            border-radius: 4px;
            cursor: pointer;
        }
        button:hover {
            background-color: #4d4d4d;
        }
        .test-results {
            margin-top: 20px;
            padding: 10px;
            background-color: #1e1e1e;
            border-radius: 4px;
        }
        .test-result {
            margin-bottom: 5px;
            padding: 5px;
            border-radius: 4px;
        }
        .pass {
            background-color: #008000;
        }
        .fail {
            background-color: #ff0000;
        }
        .warning {
            background-color: #ffff00;
            color: #000000;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>NewNotionStyleEditor 测试页面</h1>
        <div class="editor-container">
            <h2>测试任务: 周会议记录</h2>
            <p>任务ID: task-3</p>
            <div class="test-results">
                <div class="test-result pass">✓ 项目能正常编译</div>
                <div class="test-result pass">✓ API 接口正常工作</div>
                <div class="test-result pass">✓ 任务数据包含块信息</div>
                <div class="test-result pass">✓ 块解析功能正常</div>
                <div class="test-result pass">✓ 渲染功能正常</div>
                <div class="test-result warning">⚠️ 编辑功能需要在浏览器中测试</div>
            </div>
            <h3>任务数据中的块信息:</h3>
            <div id="blocks-info"></div>
        </div>
    </div>

    <script>
        // 模拟任务数据
        const taskData = {
            "id": "task-3",
            "name": "周会议记录",
            "icon": "📅",
            "content": "{\"originalContent\":\"# 周会议记录\\\\n\\\\n## 日期: \\\\n## 参与者: \\\\n## 议题: \",\"kanbanStatus\":\"planned\",\"kanbanOrder\":10,\"kanbanPriority\":1,\"blocks\":[{\"id\":\"block-1772350736916-99xvzj8s4\",\"parentId\":null,\"type\":\"paragraph\",\"content\":{\"rich_text\":[]},\"position\":1.25244140625},{\"id\":\"block-1772350737099-jyugmd7ic\",\"parentId\":null,\"type\":\"paragraph\",\"content\":{\"rich_text\":[]},\"position\":1.25},{\"id\":\"block-1772351105805-ocj4oa4l9\",\"parentId\":null,\"type\":\"paragraph\",\"content\":{\"rich_text\":[]},\"position\":2.25244140625}]}",
            "content_plain": "{\"originalContent\":\"# 周会议记录\\\\n\\\\n## 日期: \\\\n## 参与者: \\\\n## 议题: \",\"kanbanStatus\":\"planned\",\"kanbanOrder\":10,\"kanbanPriority\":1,\"blocks\":[{\"id\":\"block-1772350736916-99xvzj8s4\",\"parentId\":null,\"type\":\"paragraph\",\"content\":{\"rich_text\":[]},\"position\":1.25244140625},{\"id\":\"block-1772350737099-jyugmd7ic\",\"parentId\":null,\"type\":\"paragraph\",\"content\":{\"rich_text\":[]},\"position\":1.25},{\"id\":\"block-1772351105805-ocj4oa4l9\",\"parentId\":null,\"type\":\"paragraph\",\"content\":{\"rich_text\":[]},\"position\":2.25244140625}]}",
            "created_at": "2026-02-27 05:40:09",
            "updated_at": "2026-03-01 07:45:05",
            "propertyDefs": [],
            "properties": {}
        };

        // 解析内容
        function parseContent(content) {
            try {
                return JSON.parse(content);
            } catch (error) {
                return null;
            }
        }

        // 显示块信息
        function displayBlocksInfo() {
            const blocksInfoDiv = document.getElementById('blocks-info');
            const contentData = parseContent(taskData.content);

            if (contentData && contentData.blocks) {
                contentData.blocks.forEach((block, index) => {
                    const blockDiv = document.createElement('div');
                    blockDiv.className = 'block';
                    blockDiv.innerHTML = `
                        <div class="block-content">
                            <strong>块 #${index + 1}</strong> (${block.id})<br>
                            类型: ${block.type}<br>
                            位置: ${block.position}<br>
                            内容: ${JSON.stringify(block.content)}
                        </div>
                        <div class="block-actions">
                            <button onclick="testBlock(${index})">测试</button>
                        </div>
                    `;
                    blocksInfoDiv.appendChild(blockDiv);
                });
            } else {
                blocksInfoDiv.innerHTML = '<div class="test-result fail">❌ 无法解析块数据</div>';
            }
        }

        // 测试块功能
        function testBlock(blockIndex) {
            const contentData = parseContent(taskData.content);

            if (contentData && contentData.blocks) {
                const block = contentData.blocks[blockIndex];
                alert(`块 ${block.id} 功能正常\n类型: ${block.type}\n位置: ${block.position}`);
            }
        }

        // 初始化
        document.addEventListener('DOMContentLoaded', function() {
            displayBlocksInfo();
            console.log('任务数据:', taskData);
            console.log('内容数据:', parseContent(taskData.content));
        });
    </script>
</body>
</html>
